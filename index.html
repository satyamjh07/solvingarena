<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEROday Solver</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar glass-card">
        <div>
          <p class="brand">ZEROday</p>
          <p class="tagline" id="mode-tagline">Choose your solving mode</p>
        </div>
        <div class="score-group">
          <p id="score-display">⚡ Score: 0</p>
          <p id="streak-display">🔥 Streak: 0</p>
        </div>
      </header>

      <section id="mode-screen" class="glass-card chooser-screen">
        <h1>How would you like to solve today?</h1>
        <div class="chooser-grid">
          <button class="chooser-card" id="mode-mock">Attempt NTA Style Mock Test</button>
          <button class="chooser-card" id="mode-pyq">Solve JEE MAIN PYQs</button>
          <button class="chooser-card" id="mode-curated">Curated Subject wise questions for you</button>
        </div>
      </section>

      <section id="mock-config-screen" class="glass-card chooser-screen hidden">
        <h2>Configure NTA Style Mock Test</h2>
        <div class="form-row">
          <label for="mock-year">Select Year</label>
          <select id="mock-year"></select>
        </div>
        <div class="form-row">
          <label for="mock-shift">Select Shift</label>
          <select id="mock-shift"></select>
        </div>
        <div class="actions single">
          <button class="btn ghost" id="mock-back">Back</button>
          <button class="btn primary" id="mock-start">Start Mock Test</button>
        </div>
      </section>

      <section id="curated-screen" class="glass-card chooser-screen hidden">
        <h2>Select a Curated Booklet</h2>
        <div id="booklet-list" class="chooser-grid"></div>
        <div class="actions single">
          <button class="btn ghost" id="curated-back">Back</button>
        </div>
      </section>

      <section id="solver-screen" class="hidden">
        <section class="filters glass-card" id="filters-wrap">
          <div class="filter-item" id="subject-wrap">
            <label for="subject-filter">Subject</label>
            <select id="subject-filter"></select>
          </div>
          <div class="filter-item">
            <label for="topic-filter" id="topic-label">Topic</label>
            <select id="topic-filter"></select>
          </div>
          <div class="filter-item">
            <label for="difficulty-filter" id="difficulty-label">Difficulty</label>
            <select id="difficulty-filter"></select>
          </div>
        </section>

        <main class="question-card glass-card" id="question-card">
          <p id="progress-text" class="progress">Question 1 / 1</p>
          <p id="topic-text" class="topic">Topic: --</p>
          <h1 id="question-text"></h1>
          <img id="question-image" class="question-image" alt="Question diagram" />

          <div id="options-container" class="options"></div>

          <div id="integer-answer-wrap" class="integer-wrap hidden">
            <label for="integer-answer">Enter numerical answer</label>
            <input id="integer-answer" type="number" step="any" />
            <button id="check-integer-btn" class="btn primary" type="button">Check Answer</button>
            <p id="integer-feedback"></p>
          </div>

          <div class="actions">
            <button id="skip-btn" class="btn ghost">Skip Question</button>
            <button id="next-btn" class="btn primary" disabled>Next Question</button>
          </div>
        </main>

        <section id="empty-state" class="glass-card empty-state hidden">
          <h2>No questions match your filters.</h2>
          <p>Try changing available filters.</p>
        </section>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
