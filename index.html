<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEROday Solver</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar glass-card">
        <div>
          <p class="brand">ZEROday</p>
          <p class="tagline">Continuous Question Solving</p>
        </div>
        <div class="score-group">
          <p id="score-display">⚡ Score: 0</p>
          <p id="streak-display">🔥 Streak: 0</p>
        </div>
      </header>

      <section class="filters glass-card">
        <div class="filter-item">
          <label for="subject-filter">Subject</label>
          <select id="subject-filter"></select>
        </div>
        <div class="filter-item">
          <label for="topic-filter">Topic</label>
          <select id="topic-filter"></select>
        </div>
        <div class="filter-item">
          <label for="difficulty-filter">Difficulty</label>
          <select id="difficulty-filter">
            <option value="all">All</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </section>

      <main class="question-card glass-card" id="question-card">
        <p id="progress-text" class="progress">Question 1 / 1</p>
        <p id="topic-text" class="topic">Topic: --</p>
        <h1 id="question-text"></h1>
        <img id="question-image" class="question-image" alt="Question diagram" />
        <div id="options-container" class="options"></div>
        <div class="actions">
          <button id="skip-btn" class="btn ghost">Skip Question</button>
          <button id="next-btn" class="btn primary" disabled>Next Question</button>
        </div>
      </main>

      <section id="empty-state" class="glass-card empty-state hidden">
        <h2>No questions match your filters.</h2>
        <p>Try changing Subject, Topic, or Difficulty.</p>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
